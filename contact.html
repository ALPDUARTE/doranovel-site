<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Doranovel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; }
        
        .navbar { position: fixed; top: 0; width: 100%; height: 80px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; z-index: 1000; border-bottom: 1px solid #d4af37; }
        
        .container { max-width: 600px; margin: 150px auto 50px; padding: 0 20px; }
        h1 { text-align: center; margin-bottom: 40px; }
        .gold { color: #d4af37; }

        .contact-info { background: #111; padding: 30px; border-radius: 8px; border-left: 4px solid #d4af37; }
        .contact-item { margin-bottom: 25px; }
        .contact-item h3 { color: #d4af37; font-size: 14px; text-transform: uppercase; margin-bottom: 5px; }
        .contact-item p { font-size: 18px; }

        .footer { text-align: center; margin-top: 50px; padding: 20px; font-size: 13px; opacity: 0.6; }
    </style>
</head>
<body>
    <nav class="navbar">
        <img src="logo.png" alt="Logo" style="height:40px;">
        <div style="nav-links">
            <a href="index.html" style="color:#fff; text-decoration:none; margin-left:20px;">Home</a>
            <a href="about.html" style="color:#fff; text-decoration:none; margin-left:20px;">About</a>
        </div>
    </nav>

    <div class="container">
        <h1>Fale <span class="gold">Conosco</span></h1>
        <div class="contact-info">
            <div class="contact-item">
                <h3>E-mail Suporte</h3>
                <p>suporte@seaquake.com.br</p>
            </div>
            <div class="contact-item">
                <h3>Sede</h3>
                <p>Niterói, Rio de Janeiro</p>
            </div>
            <div class="contact-item">
                <h3>Horário de Atendimento</h3>
                <p>Segunda a Sexta, das 09h às 18h</p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Copyright 2026 | <a href="privacidade.html" style="color:#d4af37;">Privacidade</a></p>
    </footer>
</body>
</html>
