<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doranovel | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; overflow-x: hidden; }

        /* NAVBAR FIXA */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            background: transparent;
            z-index: 10000;
            transition: all 0.5s ease;
        }
        .navbar.scrolled {
            background: rgba(0, 0, 0, 0.95);
            height: 90px;
            border-bottom: 1px solid #d4af37;
        }
        .mini-logo { height: 80px; transition: 0.4s; }
        .navbar.scrolled .mini-logo { height: 60px; }
        .brand-gold { color: #d4af37; font-weight: 700; }
        .links a { color: #fff; text-decoration: none; margin-left: 25px; font-size: 13px; text-transform: uppercase; font-weight: 700; }
        .btn-login { border: 1px solid #d4af37; padding: 10px 20px; border-radius: 4px; color: #d4af37 !important; text-decoration: none; }

        /* HERO 1: VÍDEO E ROLO DE FILME REALISTA */
        .hero-main { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .video-bg iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); }
        
        .hero-text h1 { font-size: 3.5rem; text-transform: uppercase; margin-bottom: 15px; }
        .gold { color: #d4af37; }

        /* CORREÇÃO DO ROLO DE FILME (Cinema Real) */
        .film-strip { 
            position: absolute; bottom: 0; width: 100%; background: #111; 
            padding: 30px 0; border-top: 4px solid #222; border-bottom: 4px solid #222;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
        /* Furos da película (Perforations) */
        .film-strip::before, .film-strip::after {
            content: "";
            position: absolute; width: 100%; height: 15px;
            background-image: radial-gradient(circle, #000 40%, transparent 45%);
            background-size: 40px 15px;
            left: 0;
        }
        .film-strip::before { top: 7px; }
        .film-strip::after { bottom: 7px; }

        .film-track { display: flex; width: calc(320px * 16); animation: scroll-film 40s linear infinite; }
        .film-track img { 
            height: 180px; width: 300px; object-fit: cover; 
            margin: 0 10px; border: 1px solid #000; outline: 10px solid #1a1a1a; /* Frame do filme */
        }
        @keyframes scroll-film { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-320px * 8)); } }

        /* HERO 2: TRÊS COLUNAS[cite: 1] */
        .hero-categories { padding: 120px 5%; display: flex; align-items: center; min-height: 100vh; background: #050505; }
        .categories-wrapper { flex: 1.5; height: 700px; overflow: hidden; display: flex; gap: 20px; transform: rotate(-5deg); }
        .cat-col { display: flex; flex-direction: column; gap: 20px; }
        .col-extremidade { animation: scrollUp 25s linear infinite; }
        .col-meio { animation: scrollDown 25s linear infinite; }
        @keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        @keyframes scrollDown { 0% { transform: translateY(-50%); } 100% { transform: translateY(0); } }
        .card { width: 220px; height: 300px; border-radius: 15px; border: 2px solid #333; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* HERO 3: CELULAR AUMENTADO E CENTRALIZADO[cite: 1] */
        .hero-features { 
            padding: 150px 5%; display: flex; align-items: center; 
            justify-content: center; background: #000; gap: 80px; 
        }
        .feature-text { flex: 1; max-width: 500px; }
        .feature-text h2 { font-size: 3.5rem; line-height: 1.1; margin-bottom: 25px; }
        
        .phone-preview { flex: 1.2; display: flex; justify-content: center; }
        .phone-preview img { 
            width: 100%; max-width: 650px; /* Tamanho aumentado */
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.3));
            transform: rotate(-2deg);
        }

        @media (max-width: 1024px) {
            .hero-features { flex-direction: column; text-align: center; }
            .feature-text { padding-right: 0; }
            .phone-preview img { max-width: 450px; }
        }
    </style>
</head>
<body>

        </div>

        <div class="hero-text">

        <!-- ROLO DE FILME CORRIGIDO -->
        <div class="film-strip">
            <div class="film-track">

                <img src="cenas2b.jpg"> <img src="cenas2c.jpg"> <img src="cenas2d.jpg"> <img src="cena2e.jpg">

    </section>

    <!-- HERO 2: EFEITO DE ENGRENAGEM[cite: 1] -->
    <section class="hero-categories">
        <div class="text-side" style="flex:1;">
            <h2>Séries e Livros <span class="gold">Curados</span>.</h2>
            <p>Catálogo exclusivo organizado por cores.</p>
        </div>
        <div class="categories-wrapper">
            <div class="cat-col col-extremidade">
                <div class="card"><img src="cenas1a.jpg"></div><div class="card"><img src="cenas1b.jpg"></div>

            </div>
            <div class="cat-col col-extremidade">
                <div class="card"><img src="cenas2c.jpg"></div><div class="card"><img src="cenas2d.jpg"></div>
                <div class="card"><img src="cenas2c.jpg"></div><div class="card"><img src="cenas2d.jpg"></div>

            apiKey: "AIzaSyAKnX6uIhWGmV51lDq80zor6TP9xlyMhcY",

        window.onscroll = function() {
            const nav = document.getElementById('mainNavbar');

</body>
</html>
