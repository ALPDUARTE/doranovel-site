<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doranovel | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILO BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; overflow-x: hidden; }

        /* --- 1. NAVBAR (TOP) - ALINHAMENTO HORIZONTAL --- */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 120px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; background: transparent; z-index: 10000; transition: all 0.5s ease;
        }
        .navbar.scrolled { background: #000000 !important; height: 100px; border-bottom: 2px solid #E1AD01; }
        .logo-container { display: flex; align-items: center; gap: 15px; }
        .mini-logo { height: 85px; width: auto; }
        .brand-name { font-size: 32px; font-weight: 700; }
        .brand-gold { color: #E1AD01; }

        /* Links e Login na mesma linha */
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .links { display: flex; gap: 20px; }
        .links a { color: #fff; text-decoration: none; font-size: 13px; text-transform: uppercase; font-weight: 700; }
        .btn-login { border: 1px solid #E1AD01; padding: 10px 20px; border-radius: 4px; color: #E1AD01 !important; text-decoration: none; font-size: 13px; font-weight: 700; }

        /* --- 2. HERO 1: PELÍCULA COM IMAGEM EM PRIORIDADE --- */
        .hero-main { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .video-bg iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); }

        .film-strip { 
            position: absolute; bottom: 0; width: 100%; background: #111; 
            padding: 50px 0; border-top: 4px solid #E1AD01; border-bottom: 4px solid #E1AD01; 
        }
        /* Furos da película com z-index menor para não sobrepor imagens */
        .film-strip::before, .film-strip::after {
            content: "1  TITLE  2  TITLE  3  TITLE  4  TITLE  5  TITLE";
            position: absolute; width: 100%; color: rgba(255,255,255,0.3); font-size: 10px;
            letter-spacing: 60px; text-align: center;
            background-image: radial-gradient(ellipse at center, #fff 60%, transparent 72%);
            background-size: 40px 25px; height: 25px; z-index: 1; 
        }
        .film-strip::before { top: 12px; } .film-strip::after { bottom: 12px; }

        .film-track { display: flex; width: max-content; animation: scroll-film 40s linear infinite; position: relative; z-index: 5; }
        .film-track img { height: 200px; width: 320px; object-fit: cover; margin: 0 15px; border: 2px solid #000; outline: 10px solid #1a1a1a; border-radius: 4px; }
        @keyframes scroll-film { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* --- 3. HERO 2: 3 COLUNAS SEM LACUNAS --- */
        .hero-categories { padding: 120px 5%; display: flex; align-items: center; min-height: 100vh; background: #050505; gap: 40px; }
        .text-side { flex: 0.8; }
        .text-side h2 { font-size: 4rem; line-height: 1.1; margin-bottom: 30px; }
        
        .categories-wrapper { flex: 2.2; height: 800px; overflow: hidden; display: flex; gap: 20px; transform: rotate(-6deg); }
        .cat-col { display: flex; flex-direction: column; gap: 20px; }
        
        /* Animação infinita sem saltos */
        .col-extremidade { animation: scrollUp 20s linear infinite; }
        .col-meio { animation: scrollDown 20s linear infinite; }
        @keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-50.5%); } }
        @keyframes scrollDown { 0% { transform: translateY(-50.5%); } 100% { transform: translateY(0); } }

        .card { width: 240px; height: 320px; border-radius: 20px; overflow: hidden; border: 3px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .card img { width: 100%; height: 75%; object-fit: cover; }
        .card .info { height: 25%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; text-transform: uppercase; }

        /* --- 4. HERO 3: TÍTULO RESTAURADO --- */
        .hero-features { padding: 150px 5%; display: flex; align-items: center; justify-content: center; background: #000; gap: 80px; }
        .feature-text h2 { font-size: 4rem; margin-bottom: 25px; } /* Restaurado para 4rem */
        .phone-preview img { width: 100%; max-width: 650px; filter: drop-shadow(0 0 30px rgba(225, 173, 1, 0.3)); transform: rotate(-2deg); }

        /* --- 5. RESPONSIVIDADE MOBILE --- */
        @media (max-width: 768px) {
            .navbar { height: 100px; padding: 0 5%; flex-direction: row; justify-content: space-between; }
            .mini-logo { height: 50px; }
            .brand-name { font-size: 20px; }
            
            /* Alinhamento horizontal do menu e login no mobile[cite: 1] */
            .nav-right { gap: 10px; }
            .links { gap: 8px; }
            .links a { font-size: 10px; }
            .btn-login { padding: 6px 12px; font-size: 10px; }

            .feature-text h2 { font-size: 2.8rem; } /* Proporção ideal mobile[cite: 1] */
            .categories-wrapper { transform: none; height: 500px; }
            .card { width: 180px; height: 240px; }
        }
    </style>
</head>
<body>

        <div class="nav-right">

                <img src="cenas2b.jpg"> <img src="cenas2c.jpg"> <img src="cenas2d.jpg"> <img src="cena2e.jpg">
            </div>
        </div>
    </section>

    <!-- HERO 2: 3 COLUNAS INFINITAS -->
    <section class="hero-categories">
        <div class="text-side">
            <h2>Séries e Livros <span class="brand-gold">Curados</span>.</h2>

        <div class="categories-wrapper">

                <div class="card" style="background: #D48498;"><img src="cenas1a.jpg"><div class="info">Encontros 🌸</div></div>
                <div class="card" style="background: #F0F0F0; color: #000;"><img src="cenas1b.jpg"><div class="info">Suspense 🔍</div></div>

                <div class="card" style="background: #CD7F32;"><img src="cenas2b.jpg"><div class="info">Épicos 📜</div></div>
                <div class="card" style="background: #A52A2A;"><img src="cenas2a.jpg"><div class="info">Melodramas ❤️‍🔥</div></div>
                <div class="card" style="background: #CD7F32;"><img src="cenas2b.jpg"><div class="info">Épicos 📜</div></div>
            </div>
            <div class="cat-col col-extremidade">
                <div class="card" style="background: #000080;"><img src="cenas2c.jpg"><div class="info">Justiça ⚖️</div></div>
                <div class="card" style="background: #E1AD01; color: #000;"><img src="cenas2d.jpg"><div class="info">Sonhos 🎓</div></div>
                <div class="card" style="background: #000080;"><img src="cenas2c.jpg"><div class="info">Justiça ⚖️</div></div>
                <div class="card" style="background: #E1AD01; color: #000;"><img src="cenas2d.jpg"><div class="info">Sonhos 🎓</div></div>
            </div>
        </div>
    </section>

    <section class="hero-features">
        <div class="feature-text">
            <h2>Experiência <span class="brand-gold">Interativa</span>.</h2>
        </div>
        <div class="phone-preview"><img src="celular.png" alt="App Preview"></div>
    </section>

    <script>
        window.onscroll = function() {
            const nav = document.getElementById('mainNavbar');
            if (window.pageYOffset > 50) { nav.classList.add('scrolled'); }
            else { nav.classList.remove('scrolled'); }
        };
    </script>
</body>
</html>
