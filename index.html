<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doranovel - Home</title>
    <style>
        /* Estilo Base Seaquake / Doranovel */
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
        }

        /* 1) HEADER FIXO E TRANSPARENTE */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 100px; /* Head maior conforme solicitado */
            background: transparent;
            transition: background 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 1000;
        }

        /* Classe que o JS adicionará ao rolar */
        header.scrolled {
            background: rgba(0, 0, 0, 0.95);
            height: 80px; /* Diminui levemente ao rolar para dar sofisticação */
        }

        .logo {
            height: 60px;
            transition: height 0.3s;
        }

        header.scrolled .logo {
            height: 50px;
        }

        /* Menu simples */
        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 15px;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* 2) CONTEÚDO PRINCIPAL (BOXER) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            /* Vídeo de fundo seria aplicado aqui no CSS ou via tag <video> */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('seu-fundo.jpg');
            background-size: cover;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .gold-text { color: #d4af37; } /* Tom dourado/mostarda */

        /* BOTÕES DAS LOJAS REMOVIDOS AQUI */

        @media (max-width: 768px) {
            header { height: 120px; } /* Head maior no Mobile */
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header id="mainHeader">
        <img src="logo-doranovel.png" class="logo" alt="Doranovel">
        <nav>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <button onclick="logout()" style="background:transparent; border:1px solid #d4af37; color:#fff; padding:5px 15px; border-radius:5px; cursor:pointer;">Sair</button>
        </nav>
    </header>

    <section class="hero">
        <h1>Momentos <span class="gold-text">Dourados</span>,<br>Desejos Sem Fim.</h1>
        <p>Sua plataforma premium para doramas e webnovels curados.</p>
        
        <!-- Espaço onde ficavam os botões das lojas agora está limpo -->
    </section>

    <!-- Script para o efeito do Header -->
    <script>
        window.onscroll = function() {
            var header = document.getElementById("mainHeader");
            if (window.pageYOffset > 50) {
                header.classList.add("scrolled");
            } else {
                header.classList.remove("scrolled");
            }
        };

        function logout() {
            // Lógica de logout do Firebase que integraremos ao Android Studio
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
