<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doranovel | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .navbar { position: fixed; top: 0; width: 100%; height: 100px; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; background: #000; border-bottom: 2px solid #E1AD01; z-index: 1000; }
        .logo-container { display: flex; align-items: center; gap: 15px; }
        .mini-logo { height: 60px; }
        .brand-gold { color: #E1AD01; }
        
        /* CONTAINER DE VÍDEOS DO FIRESTORE */
        .gallery-container { padding: 120px 5% 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .video-card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
        .video-card:hover { border-color: #E1AD01; transform: translateY(-5px); }
        .video-card img { width: 100%; height: 180px; object-fit: cover; }
        .video-card h3 { padding: 15px; font-size: 1rem; color: #E1AD01; }
        .video-card p { padding: 0 15px 15px; font-size: 0.8rem; color: #ccc; }
        
        .btn-logout { background: transparent; border: 1px solid #ff4444; color: #ff4444; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 10px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="logo.png" alt="Logo" class="mini-logo">
            <span style="font-size: 24px; font-weight: 700;"><span class="brand-gold">Dora</span>novel</span>
        </div>
        <button class="btn-logout" id="logoutBtn">Sair da Conta</button>
    </nav>

    <div class="gallery-container" id="video-gallery">
        <p style="text-align: center; grid-column: 1/-1;">Carregando sua biblioteca premium...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKnX6uIhWGmV51lDq80zor6TP9xlyMhcY",
            authDomain: "doranovel.firebaseapp.com",
            projectId: "doranovel",
            storageBucket: "doranovel.firebasestorage.app",
            appId: "1:105334550592:web:eaf414923e311ae62eafa5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // PROTEÇÃO DE ROTA - Se não estiver logado, volta para o login
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                carregarDoranovel();
            }
        });

        // BUSCA DADOS NO FIRESTORE
        async function carregarDoranovel() {
            const gallery = document.getElementById('video-gallery');
            try {
                const querySnapshot = await getDocs(collection(db, "Doranovel"));
                gallery.innerHTML = ""; // Limpa o carregando

                querySnapshot.forEach((doc) => {
                    const dorama = doc.data();
                    gallery.innerHTML += `
                        <div class="video-card">
                            <img src="${dorama.capa || 'placeholder.jpg'}" alt="${dorama.titulo}">
                            <h3>${dorama.titulo}</h3>
                            <p>${dorama.categoria || 'Série Premium'}</p>
                        </div>
                    `;
                });
            } catch (error) {
                gallery.innerHTML = `<p>Erro ao carregar vídeos: ${error.message}</p>`;
            }
        }

        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
</html>
