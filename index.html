<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doranovel | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILO BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; overflow-x: hidden; }

        /* --- 1. NAVBAR (TOP) - TRANSIÇÃO E PROPORÇÃO --- */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 120px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; background: transparent; z-index: 10000; transition: all 0.5s ease;
        }
        .navbar.scrolled { background: #000000 !important; height: 100px; border-bottom: 2px solid #E1AD01; }
        
        .logo-container { display: flex; align-items: center; gap: 15px; }
        .mini-logo { height: 85px; width: auto; transition: 0.4s; }
        .navbar.scrolled .mini-logo { height: 65px; }
        .brand-name { font-size: 36px; font-weight: 700; }
        .brand-gold { color: #E1AD01; }

        .links { display: flex; align-items: center; gap: 30px; }
        .links a { color: #fff; text-decoration: none; font-size: 14px; text-transform: uppercase; font-weight: 700; }
        .btn-login { border: 1px solid #E1AD01; padding: 12px 25px; border-radius: 4px; color: #E1AD01 !important; }

        /* --- 2. HERO 1: VÍDEO E PELÍCULA REALISTA (RETÂNGULOS) --- */
        .hero-main { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .video-bg iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); }
        
        /* TÍTULOS MAIORES E DESTAQUE */
        .hero-text h1 { font-size: 4.5rem; text-transform: uppercase; margin-bottom: 20px; text-shadow: 3px 3px 15px #000; }
        .gold { color: #E1AD01; }

        /* PELÍCULA COM FUROS RETANGULARES (35mm REAL) */
        .film-strip { 
            position: absolute; bottom: 0; width: 100%; background: #111; 
            padding: 40px 0; border-top: 4px solid #E1AD01; border-bottom: 4px solid #E1AD01; 
        }
        .film-strip::before, .film-strip::after {
            content: ""; position: absolute; width: 100%; height: 18px;
            /* Furos retangulares com pontas arredondadas via gradiente[cite: 1] */
            background-image: linear-gradient(90deg, #fff 0%, #fff 60%, transparent 60%);
            background-size: 45px 100%; left: 0; border-radius: 4px;
        }
        .film-strip::before { top: 10px; } .film-strip::after { bottom: 10px; }

        .film-track { display: flex; width: max-content; animation: scroll-film 35s linear infinite; }
        .film-track img { height: 190px; width: 310px; object-fit: cover; margin: 0 12px; border: 1px solid #000; outline: 12px solid #1a1a1a; }
        @keyframes scroll-film { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* --- 3. HERO 2: CATEGORIAS (TRÊS COLUNAS E CORES OFICIAIS)[cite: 1] --- */
        .hero-categories { padding: 120px 5%; display: flex; align-items: center; min-height: 100vh; background: #050505; gap: 60px; }
        .text-side h2 { font-size: 4rem; line-height: 1.1; margin-bottom: 30px; }
        
        .categories-wrapper { flex: 1.5; height: 800px; overflow: hidden; display: flex; gap: 25px; transform: rotate(-6deg) skewX(-2deg); }
        .cat-col { display: flex; flex-direction: column; gap: 25px; }
        .col-extremidade { animation: scrollUp 25s linear infinite; }
        .col-meio { animation: scrollDown 25s linear infinite; }
        @keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        @keyframes scrollDown { 0% { transform: translateY(-50%); } 100% { transform: translateY(0); } }

        .card { width: 250px; height: 330px; border-radius: 25px; overflow: hidden; border: 3px solid rgba(255,255,255,0.1); }
        .card img { width: 100%; height: 75%; object-fit: cover; }
        .card .info { height: 25%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; text-align: center; padding: 10px; text-transform: uppercase; }

        /* --- 4. HERO 3: MOCKUP GRANDE[cite: 1] --- */
        .hero-features { padding: 150px 5%; display: flex; align-items: center; justify-content: center; background: #000; gap: 80px; }
        .feature-text h2 { font-size: 4rem; margin-bottom: 25px; }
        .phone-preview img { width: 100%; max-width: 700px; filter: drop-shadow(0 0 35px rgba(225, 173, 1, 0.4)); transform: rotate(-2deg); }

        /* --- 5. RESPONSIVIDADE MOBILE (RESTAURAÇÃO DA EXCELÊNCIA)[cite: 1] --- */
        @media (max-width: 768px) {
            .navbar { height: 155px; flex-direction: column; padding: 15px 5%; justify-content: flex-start; } /* Aumento estratégico da base inferior[cite: 1] */
            .mini-logo { height: 60px; }
            .brand-name { font-size: 24px; }
            .links { margin-top: 15px; width: 100%; justify-content: center; gap: 12px; }
            .links a { font-size: 11px; margin: 0 5px; }
            .btn-login { padding: 6px 15px; }

            .hero-text h1 { font-size: 2.5rem; }
            .hero-categories, .hero-features { flex-direction: column; text-align: center; padding: 100px 5% 60px; }
            .text-side h2, .feature-text h2 { font-size: 2.8rem; }
            .categories-wrapper { transform: none; height: 550px; width: 100%; }
            .card { width: 180px; height: 240px; }
            .phone-preview img { max-width: 95%; margin-top: 30px; }
        }
    </style>
</head>
<body>

    <script>
        window.onscroll = function() {
            const nav = document.getElementById('mainNavbar');
            if (window.pageYOffset > 50) { nav.classList.add('scrolled'); }
            else { nav.classList.remove('scrolled'); }
        };
