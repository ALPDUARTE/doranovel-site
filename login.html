<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doranovel | Login & Acesso</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILO BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }

        .navbar {
            width: 100%; height: 100px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; background: #000; border-bottom: 2px solid #E1AD01;
        }
        .mini-logo { height: 60px; }
        .brand-name { font-size: 28px; font-weight: 700; color: #fff; display: flex; align-items: center; }
        .brand-gold { color: #E1AD01; }
        .back-link { color: #E1AD01; text-decoration: none; font-size: 14px; font-weight: 700; text-transform: uppercase; }

        .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 5%; gap: 50px; }

        /* BOX DE LOGIN */
        .login-box { 
            flex: 1; max-width: 450px; background: #111; padding: 40px; border-radius: 20px; 
            border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .login-box h2 { font-size: 2rem; margin-bottom: 20px; color: #E1AD01; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 12px; color: #999; text-transform: uppercase; }
        .input-group input { 
            width: 100%; padding: 15px; background: #222; border: 1px solid #333; 
            border-radius: 8px; color: #fff; font-family: 'Montserrat'; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: #E1AD01; }

        .btn-access { 
            width: 100%; padding: 15px; background: #E1AD01; border: none; border-radius: 8px; 
            color: #000; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-bottom: 15px;
        }
        .social-login { 
            width: 100%; padding: 12px; background: transparent; border: 1px solid #444; 
            border-radius: 8px; color: #fff; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; gap: 10px; font-weight: 700; margin-bottom: 20px;
        }

        /* LINK DE CADASTRO */
        .signup-link { text-align: center; font-size: 14px; color: #999; }
        .signup-link a { color: #E1AD01; text-decoration: none; font-weight: 700; }

        /* BOX DE DOWNLOAD E MENSAGENS */
        .download-box { 
            flex: 1; max-width: 500px; text-align: center; padding: 40px; 
            background: linear-gradient(145deg, #0a0a0a, #151515); border-radius: 25px; border: 1px solid #E1AD01;
        }
        .download-box h3 { font-size: 1.8rem; margin-bottom: 15px; }
        .download-box p { color: #ccc; margin-bottom: 30px; line-height: 1.6; }
        
        .btn-download { 
            display: inline-block; padding: 15px 40px; background: transparent; 
            border: 2px solid #E1AD01; color: #E1AD01; border-radius: 50px; 
            text-decoration: none; font-weight: 700; text-transform: uppercase; transition: 0.4s; 
        }
        .btn-download:hover { background: #E1AD01; color: #000; }

        /* BOTÃO DE LOGOUT */
        .btn-logout { 
            margin-top: 20px; background: transparent; border: 1px solid #ff4444; 
            color: #ff4444; padding: 10px 20px; border-radius: 8px; cursor: pointer; 
            font-weight: 700; text-transform: uppercase; font-size: 12px; transition: 0.3s;
        }
        .btn-logout:hover { background: #ff4444; color: #fff; }

        /* ESTADOS DE EXIBIÇÃO */
        #logged-out-view, #logged-in-view { display: none; }

        @media (max-width: 768px) {
            .login-wrapper { flex-direction: column; gap: 30px; }
            .download-box { order: -1; width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="logo.png" alt="Logo" class="mini-logo">
            <span class="brand-name"><span class="brand-gold">Dora</span>novel</span>
        </div>
        <a href="index.html" class="back-link">Voltar ao Site</a>
    </nav>

    <main class="login-wrapper">
        
        <!-- VISÃO: NÃO LOGADO -->
        <section class="login-box" id="logged-out-view">
            <h2>Acessar</h2>
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn-access" id="loginEmailBtn">Entrar</button>
            
            <button class="social-login" id="googleBtn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> 
                Entrar com Google
            </button>

            <div class="signup-link">
                Não tem conta? <a href="#" id="showSignup">Criar uma conta</a>
            </div>
        </section>

        <!-- VISÃO: LOGADO -->
        <section class="download-box" id="logged-in-view">
            <h3 style="color: #E1AD01;">Parabéns!</h3>
            <p>Você está logado. Agora é só baixar o aplicativo oficial para não perder nenhum dorama!</p>
            <a href="seu-app-download.apk" class="btn-download">CLIQUE PARA BAIXAR</a>
            <br>
            <button class="btn-logout" id="logoutBtn">Sair da Conta</button>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKnX6uIhWGmV51lDq80zor6TP9xlyMhcY",
            authDomain: "doranovel.firebaseapp.com",
            projectId: "doranovel",
            storageBucket: "doranovel.firebasestorage.app",
            appId: "1:105334550592:web:eaf414923e311ae62eafa5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // ELEMENTOS
        const loggedOutView = document.getElementById('logged-out-view');
        const loggedInView = document.getElementById('logged-in-view');
        const logoutBtn = document.getElementById('logoutBtn');
        const googleBtn = document.getElementById('googleBtn');

        // MONITOR DE ESTADO
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loggedOutView.style.display = 'none';
                loggedInView.style.display = 'block';
            } else {
                loggedOutView.style.display = 'block';
                loggedInView.style.display = 'none';
            }
        });

        // ACÇÕES
        googleBtn.onclick = () => signInWithRedirect(auth, provider);
        
        logoutBtn.onclick = () => {
            signOut(auth).then(() => {
                window.location.reload(); // Recarrega para limpar o estado visual
            });
        };

        // Exemplo simples de Alerta para Cadastro (como você pediu para ver como está funcionando)
        document.getElementById('showSignup').onclick = (e) => {
            e.preventDefault();
            alert("Aqui abriremos o formulário de cadastro ou redirecionaremos para a página de registro do Firebase.");
        };
    </script>
</body>
</html>
