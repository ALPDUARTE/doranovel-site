<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doranovel - Login Premium</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos para o Header Fixo e Transparente */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 100px; /* Head maior conforme solicitado */
            background: transparent;
            transition: background 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        /* Classe que o JavaScript adicionará ao rolar */
        header.scrolled {
            background: #000000;
        }

        body {
            margin: 0;
            padding-top: 100px; /* Evita que o conteúdo comece embaixo do head */
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Vídeo de fundo fixo */
        .video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
        }

        .login-boxer {
            background: rgba(0, 0, 0, 0.7); /* Transparência para o conteúdo */
            padding: 40px;
            border-radius: 8px;
            max-width: 400px;
            margin: 50px auto;
        }

        /* Estilo para Mobile */
        @media (max-width: 768px) {
            header {
                height: 120px; /* Head ainda maior no mobile */
            }
            .login-boxer {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <!-- Vídeo de Fundo -->
    <video autoplay muted loop class="video-background">
        <source src="background-seaquake.mp4" type="video/mp4">
    </video>

    <!-- Header Fixo -->
    <header id="mainHeader">
        <img src="logo-seaquake.png" alt="Seaquake Logo" style="height: 60px;">
    </header>

    <!-- Conteúdo do Login -->
    <main>
        <div class="login-boxer">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" id="email" placeholder="E-mail" required>
                <input type="password" id="password" placeholder="Senha" required>
                <button type="submit" class="btn-entrar">ENTRAR</button>
            </form>
            
            <div class="social-login">
                <!-- Botões de login social nativos para Android Studio -->
                <button onclick="loginGoogle()">Entrar com Google</button>
                <button onclick="loginFacebook()">Entrar com Facebook</button>
            </div>
        </div>
    </main>

    <script>
        // Lógica para mudar a cor do Header ao rolar
        window.onscroll = function() {
            var header = document.getElementById("mainHeader");
            if (window.pageYOffset > 50) {
                header.classList.add("scrolled");
            } else {
                header.classList.remove("scrolled");
            }
        };

        // As funções de login do Firebase (Redirect) permanecem as mesmas que configuramos
    </script>
</body>
</html>
