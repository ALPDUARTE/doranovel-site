<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doranovel | Acesso Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { width: 100%; height: 100px; display: flex; align-items: center; justify-content: center; background: #000; border-bottom: 2px solid #E1AD01; }
        .brand-name { font-size: 28px; font-weight: 700; }
        .brand-gold { color: #E1AD01; }
        .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { width: 100%; max-width: 400px; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #222; text-align: center; }
        .login-box h2 { color: #E1AD01; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 11px; color: #999; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; background: #222; border: 1px solid #333; border-radius: 8px; color: #fff; outline: none; }
        .btn-access { width: 100%; padding: 15px; background: #E1AD01; border: none; border-radius: 8px; color: #000; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .social-login { width: 100%; padding: 12px; background: #fff; border: none; border-radius: 8px; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 700; margin-top: 15px; }
        #download-area { display: none; padding: 20px; }
        .btn-download { display: inline-block; padding: 15px 30px; background: #E1AD01; color: #000; text-decoration: none; border-radius: 50px; font-weight: 700; margin-top: 20px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <span class="brand-name"><span class="brand-gold">Dora</span>novel</span>
    </nav>

    <main class="login-wrapper">
        <!-- TELA DE LOGIN/CADASTRO -->
        <section class="login-box" id="auth-view">
            <h2>Acesse seu Acervo</h2>
            <div class="input-group">
                <label>E-MAIL</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>
            <div class="input-group">
                <label>SENHA</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn-access" id="loginBtn">ENTRAR / CADASTRAR</button>
            <button class="social-login" id="googleBtn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" style="width:18px"> Entrar com Google
            </button>
        </section>

        <!-- TELA PÓS-LOGIN (PARA QUEM ACESSA PELO SITE) -->
        <section class="login-box" id="download-area">
            <h2 style="color: #fff">Sucesso!</h2>
            <p>Seu acesso premium foi validado.</p>
            <a href="doranovel-v1.apk" class="btn-download">BAIXAR APP AGORA</a>
            <p style="margin-top: 20px; font-size: 12px; color: #888;">Após baixar, basta logar no App para ver o acervo.</p>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKnX6uIhWGmV51lDq80zor6TP9xlyMhcY",
            authDomain: "doranovel.firebaseapp.com",
            projectId: "doranovel",
            appId: "1:105334550592:web:eaf414923e311ae62eafa5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // LÓGICA: Se estiver no App (detectado pelo User-Agent), vai para o index real.
                // Se estiver no site, mostra o download do App.
                if (navigator.userAgent.includes("DoranovelApp")) {
                    window.location.href = "index_app.html"; 
                } else {
                    document.getElementById('auth-view').style.display = 'none';
                    document.getElementById('download-area').style.display = 'block';
                }
            }
        });

        document.getElementById('googleBtn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch {
                await createUserWithEmailAndPassword(auth, email, password).catch(e => alert(e.message));
            }
        };
    </script>
</body>
</html>
