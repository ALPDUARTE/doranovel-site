<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doranovel | Premium Landpage</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- NOVAS MODIFICAÇÕES ESTÉTICAS --- */
        
        /* 1. Header Fixo e Transparente */
        .navbar {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px; /* Head maior solicitado */
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 2000;
            transition: background 0.5s ease, height 0.5s ease;
            border-bottom: none;
        }

        /* 2. Header quando o usuário rola a página */
        .navbar.scrolled {
            background: #000000 !important;
            height: 80px;
            border-bottom: 1px solid #AIzaSy; /* Detalhe sutil */
        }

        /* 3. Ajuste do Conteúdo Hero para não ser cortado pelo Header Fixo */
        .hero-main {
            padding-top: 0 !important;
        }

        /* 4. Garantir que a logo e o nome da marca apareçam sempre */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mini-logo {
            height: 50px;
            width: auto;
        }

        /* 5. Estilo do botão de login no Header */
        .btn-login {
            border: 1px solid #d4af37;
            padding: 8px 20px !important;
            border-radius: 4px;
            background: transparent;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #d4af37;
            color: #000 !important;
        }

        /* 6. Remoção visual dos botões de aplicativos (ajustado via CSS por segurança) */
        .apps {
            display: none !important;
        }
    </style>
</head>
<body>
  
    <section class="hero-main">
        <div class="video-bg">
            <!-- Seu vídeo original mantido -->
            <iframe src="https://www.youtube.com/embed/hNcXRgX37PA?autoplay=1&mute=1&loop=1&playlist=hNcXRgX37PA,kQmfxQw_c0Y,PYQ2vLQx41M,ofkR9kPWmJw,BksusGo9W0E,d3euksbk9EA&controls=0&showinfo=0&rel=0" frameborder="0" allow="autoplay; encrypted-media"></iframe>
        </div>
        <div class="overlay"></div>
        
        <div class="content">
            <!-- NAVBAR MODIFICADA -->
            <nav class="navbar" id="mainNavbar">
                <div class="logo-container">
                    <img src="logo.png" alt="Logo" class="mini-logo">
                    <span class="brand-name"><span class="brand-gold">Dora</span>novel</span>
                </div>
                <div class="links">
                    <a href="#">About</a>
                    <a href="#">Why Choose Us</a>
                    <a href="#">Contact</a>
                    <a href="login.html" class="btn-login">Login</a>
                </div>
            </nav>

            <div class="hero-text">
                <h1>Momentos <span class="gold">Dourados</span>,<br>Desejos <span class="gold">Sem Fim</span>.</h1>
                <p>Sua plataforma premium para doramas e webnovels curados.</p>
                <!-- Botões de lojas removidos conforme solicitado -->
            </div>
        </div>

        <div class="film-strip">
            <div class="film-track">
                <img src="cenas1a.jpg" alt="Cena">
                <img src="cenas1b.jpg" alt="Cena">
                <img src="cenas1c.jpg" alt="Cena">
                <img src="cenas2a.jpg" alt="Cena">
                <img src="cenas2b.jpg" alt="Cena">
                <img src="cenas2c.jpg" alt="Cena">
                <img src="cenas2d.jpg" alt="Cena">
                <img src="cena2e.jpg" alt="Cena">
            </div>
        </div>
    </section>

    <!-- Outras seções mantidas para permitir rolagem (Heros seguintes) -->
    <section class="hero-categories">
        <div class="container">
            <div class="text-side">
                <h2>Séries e Livros <br><span class="gold">Curados</span> em <br><span class="pink">Categorias</span> de <br>Cores.</h2>
            </div>
            <!-- Conteúdo de categorias mantido -->
        </div>
    </section>

    <footer class="footer">
        <img src="logo.png" alt="Logo" class="footer-logo">
        <p>www.doranovel.com | Copyright 2026</p>
    </footer>

    <!-- Firebase SDK e Lógica de Registro Corrigida -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKnX6uIhWGmV51lDq80zor6TP9xlyMhcY",
            authDomain: "doranovel.firebaseapp.com",
            projectId: "doranovel",
            storageBucket: "doranovel.firebasestorage.app",
            messagingSenderId: "105334550592",
            appId: "1:105334550592:web:eaf414923e311ae62eafa5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // RESOLUÇÃO DO REGISTRO: Captura o resultado do redirecionamento do Facebook/Google
        getRedirectResult(auth).then((result) => {
            if (result) {
                console.log("Usuário registrado com sucesso:", result.user);
                // Aqui os dados são efetivamente inseridos no Firebase Auth
            }
        }).catch((error) => {
            console.error("Erro no registro:", error.message);
        });

        // Lógica de Scroll para o Header
        window.onscroll = function() {
            const nav = document.getElementById('mainNavbar');
            if (window.pageYOffset > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        };
    </script>
</body>
</html>
