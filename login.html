<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Doranovel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <a href="index.html" class="back-home">⬅ Voltar para o site</a>

    <div class="login-wrapper">
        <div class="login-form-side">
            <div class="logo-container" style="justify-content: center; margin-bottom: 30px;">
                <img src="logo.png" alt="Logo" class="mini-logo" style="height: 60px;">
                <span class="brand-name"><span class="brand-gold">Dora</span>novel</span>
            </div>
            
            <h2>Bem-vindo de volta!</h2>
            <p>Acesse sua conta para continuar suas histórias.</p>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail" required>
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Digite sua senha" required>
                </div>
                <div class="forgot-password">
                    <a href="#">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="btn-submit">Entrar na Conta</button>

                <div class="social-divider">
                    <span>ou acesse rápido com</span>
                </div>

                <div class="social-login">
                    <button type="button" class="btn-social" id="btnGoogle">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                        Google
                    </button>
                    <button type="button" class="btn-social" id="btnFacebook" style="background-color: #1877F2; color: white;">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook">
                        Facebook
                    </button>
                </div>
            </form>

            <p class="register-link">Ainda não tem conta? <a href="#" id="btnRegister">Cadastre-se grátis</a></p>
        </div>

        <div class="login-app-side">
            <div class="app-promo-content">
                <h3>A melhor experiência <br>está no nosso <span class="gold">App</span>.</h3>
                <p>Escaneie o QR Code abaixo para baixar o Doranovel gratuitamente.</p>
                <div class="qr-code-box">
                    <img src="qrcode.png" alt="QR Code para Download" class="qr-image">
                </div>
            </div>
        </div>
    </div>

    <!-- Lógica de Autenticação Firebase com Método Redirect -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            GoogleAuthProvider, 
            FacebookAuthProvider, 
            signInWithRedirect, 
            getRedirectResult 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKnX6uIhWGmV51lDq80zor6TP9xlyMhcY",
            authDomain: "doranovel.firebaseapp.com",
            projectId: "doranovel",
            storageBucket: "doranovel.firebasestorage.app",
            messagingSenderId: "105334550592",
            appId: "1:105334550592:web:eaf414923e311ae62eafa5",
            measurementId: "G-F1ZH3L20YH"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- CAPTURAR RESULTADO DO REDIRECIONAMENTO (Google/Facebook) ---
        getRedirectResult(auth)
            .then((result) => {
                if (result) {
                    alert("Sucesso! Bem-vindo(a), " + result.user.displayName);
                    window.location.href = "index.html";
                }
            })
            .catch((error) => {
                console.error("Erro no retorno do login social:", error.code);
                if (error.code === 'auth/account-exists-with-different-credential') {
                    alert("Este e-mail já está vinculado a outro provedor de login.");
                } else {
                    alert("Erro na autenticação social: " + error.message);
                }
            });

        // --- LOGIN COM GOOGLE (REDIRECT) ---
        const googleProvider = new GoogleAuthProvider();
        document.getElementById('btnGoogle').addEventListener('click', () => {
            signInWithRedirect(auth, googleProvider);
        });

        // --- LOGIN COM FACEBOOK (REDIRECT)[cite: 4] ---
        const facebookProvider = new FacebookAuthProvider();
        // Nota: Removido addScope('email') para evitar o erro de 'Invalid Scopes' até o app estar 'Live'[cite: 1]
        document.getElementById('btnFacebook').addEventListener('click', () => {
            signInWithRedirect(auth, facebookProvider);
        });

        // Login por E-mail convencional[cite: 4]
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then(() => { window.location.href = "index.html"; })
                .catch((error) => { alert("Erro: " + error.message); });
        });

        // Cadastro por E-mail convencional[cite: 4]
        document.getElementById('btnRegister').addEventListener('click', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if(!email || !password) return alert("Preencha e-mail e senha para cadastrar.");

            createUserWithEmailAndPassword(auth, email, password)
                .then(() => { alert("Conta criada com sucesso!"); window.location.href = "index.html"; })
                .catch((error) => { alert("Erro no cadastro: " + error.message); });
        });
    </script>
</body>
</html>
