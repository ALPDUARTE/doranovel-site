<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doranovel - Experiência Premium</title>
    <style>
        /* Reset e Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: #000; color: #fff; overflow-x: hidden; }

        /* 1. VÍDEO DE FUNDO FIXO */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        video {
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            opacity: 0.6; /* Ajuste para dar contraste ao texto */
        }

        /* 2. HEADER FIXO E TRANSPARENTE */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px; /* Limitado conforme solicitado */
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
            transition: background 0.4s ease;
        }

        header.scrolled {
            background: rgba(0, 0, 0, 0.9); /* Fica preto ao rolar */
            border-bottom: 1px solid #d4af37;
        }

        .logo-img { height: 50px; width: auto; }

        nav a { color: #fff; text-decoration: none; margin-left: 20px; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        .btn-sair { border: 1px solid #d4af37; padding: 5px 15px; border-radius: 4px; color: #fff; background: transparent; cursor: pointer; }

        /* 3. CONTEÚDO (HEROS) */
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
        }

        h1 { font-size: 3rem; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        h1 span { color: #d4af37; }
        p { font-size: 1.2rem; max-width: 600px; line-height: 1.6; }

        /* Estilo para Mobile */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            header { height: 100px; }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- Certifique-se que o nome do arquivo abaixo esteja idêntico ao que você subiu no GitHub -->
        <video autoplay muted loop playsinline>
            <source src="background-seaquake.mp4" type="video/mp4">
        </video>
    </div>

    <header id="mainHeader">
        <a href="index.html">
            <!-- Caso a imagem não carregue, o texto 'Doranovel' aparecerá -->
            <img src="logo-doranovel.png" alt="Doranovel" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
            <span style="display:none; font-weight:bold; font-size:24px; color:#d4af37;">Doranovel</span>
        </a>
        <nav>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <button class="btn-sair" onclick="fazerLogout()">Sair</button>
        </nav>
    </header>

    <!-- Hero 1 -->
    <section>
        <h1>Momentos <span>Dourados</span>,<br>Desejos Sem Fim.</h1>
        <p>Sua plataforma premium para doramas e webnovels curados.</p>
    </section>

    <!-- Hero 2 (Exemplo de rolagem) -->
    <section style="background: rgba(0,0,0,0.4);">
        <h1>Experiência <span>Underground</span></h1>
        <p>Estética surf urbana sofisticada agora no seu Android.</p>
    </section>

    <script>
        // Efeito de mudar cor do header ao rolar
        window.onscroll = function() {
            var header = document.getElementById("mainHeader");
            if (window.pageYOffset > 50) {
                header.classList.add("scrolled");
            } else {
                header.classList.remove("scrolled");
            }
        };

        function fazerLogout() {
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
